<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Kingdom Tower - Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body class="bg-black">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow-lg bg-dark text-white" style="width: 100%; max-width: 400px;">
            <h2 class="text-center text-warning mb-4">Kingdom Tower</h2>
            <p class="text-center">Авторизация</p>
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form action="/login" method="post">
                <div class="mb-3">
                    <input type="text" name="Login" class="form-control bg-secondary text-white" placeholder="Логин" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control bg-secondary text-white" placeholder="Пароль" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold">Войти</button>
            </form>
            <div class="text-center mt-3">
                <a href="/reg" class="text-warning">Регистрация</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
