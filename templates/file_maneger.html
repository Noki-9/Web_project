<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/file_manager_style.css">
    <title>Файловый менеджер</title>
</head>
<body>
<div class="container">
    <div class="toolbar">
        <button class="btn-upload" onclick="uploadSelected()">
            <span class="icon">💾</span> Загрузить
        </button>
        <button class="btn-delete" onclick="deleteSelected()">
            <span class="icon">🗑️</span> Удалить
        </button>
        <button class="btn-create" onclick="createKingdom()">Создать</button>
    </div>
    <div class="workspace">
        {% if kingdoms %}
        <ul id="kingdom-list">
            {% for k in kingdoms %}
            <li data-id="{{ k.id }}" onclick="selectKingdom(this)">{{ k.name }}</li>
            {% endfor %}
        </ul>
        {% else %}
        <p>Нет королевств</p>
        {% endif %}
    </div>
</div>
<script src="/scripts/file_script.js"></script>
</body>
</html>
