<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kingdom Tower - Склад</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body class="bg-black">
    <nav class="navbar navbar-expand-lg bg-dark border-bottom border-warning">
        <div class="container">
            <a class="navbar-brand text-warning" href="/file_maneger">🏰 Kingdom Tower</a>
            <div class="ms-auto">
                <a href="/kingdom" class="btn btn-outline-warning">← Назад</a>
            </div>
        </div>
    </nav>
    <div class="container mt-3 mt-md-4">
        <div class="card bg-dark text-white shadow-lg">
            <div class="card-header bg-warning text-dark fw-bold">📦 Склад</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="text-warning">Уровень складов</label>
                    <div class="row g-2">
                        <div class="col-4"><input type="number" id="warehouse-l1" class="form-control" min="0" value="0" placeholder="1 ур (5)"></div>
                        <div class="col-4"><input type="number" id="warehouse-l2" class="form-control" min="0" value="0" placeholder="2 ур (10)"></div>
                        <div class="col-4"><input type="number" id="warehouse-l3" class="form-control" min="0" value="0" placeholder="3 ур (20)"></div>
                    </div>
                    <small class="text-muted">Всего складов: <span id="total-warehouses">0</span>. Мест: <span id="capacity">0</span></small>
                </div>

                <h5 class="text-warning">Содержимое склада</h5>
                <ul id="warehouse-items" class="list-group mb-3" style="max-height: 300px; overflow-y: auto;"></ul>

                <h5 class="text-warning">Добавить ресурс</h5>
                <div class="row g-2 mb-3">
                    <div class="col-6"><input type="text" id="item-name" class="form-control" placeholder="Название"></div>
                    <div class="col-3"><input type="number" id="item-count" class="form-control" min="1" value="1" placeholder="Кол-во"></div>
                    <div class="col-3">
                        <select id="storage-type" class="form-control">
                            <option value="single">Единичный</option>
                            <option value="stack">Множественный</option>
                        </select>
                    </div>
                </div>
                <button id="add-item" class="btn btn-warning w-100 mb-3">➕ Добавить</button>

                <div class="d-flex flex-column flex-md-row justify-content-between gap-2">
                    <button class="btn btn-secondary" onclick="location.reload()">🔄 Сбросить</button>
                    <button id="saveBtn" class="btn btn-success">💾 Сохранить</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const kingdomData = {{ kingdom|tojson }};
    </script>
    <script src="/scripts/warehouse_script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
